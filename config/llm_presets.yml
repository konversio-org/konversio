# Pilot LLM preset bundles.
#
# Each preset assigns a provider + model to each of the three routing slots
# (chat, embedding, audio). Selecting a preset in Super Admin > LLM Settings
# writes the six PILOT_LLM_<SLOT>_* InstallationConfig rows atomically.
#
# Schema:
#   slug:      Stable identifier (kebab-case, also persisted in PILOT_LLM_PRESET)
#   label:     Human-readable name shown in the UI
#   chat:      { provider: <slug>, model: <model id> }
#   embedding: { provider: <slug>, model: <model id> }
#   audio:     { provider: <slug>, model: <model id> }
#
# Validation runs at boot. Presets referencing an unknown provider or a
# provider that doesn't declare the slot's capability are dropped with a
# logged warning — they never raise.
presets:
  - slug: all-openai
    label: All OpenAI
    chat: { provider: openai, model: gpt-4.1-mini }
    embedding: { provider: openai, model: text-embedding-3-small }
    audio: { provider: openai, model: whisper-1 }

  - slug: all-scaleway
    label: All Scaleway (open source, multilingual)
    # Qwen3 235B MoE: 113+ languages incl. Dutch, 250k context. More capable
    # than Mistral Small at a comparable price/quality ratio.
    chat: { provider: scaleway, model: qwen3-235b-a22b-instruct-2507 }
    # BGE multilingual: 100+ languages, top of MTEB multilingual; 3584 dims.
    embedding: { provider: scaleway, model: bge-multilingual-gemma2 }
    # Whisper large v3: multilingual transcription including Dutch.
    audio: { provider: scaleway, model: whisper-large-v3 }

  - slug: all-nebius
    label: All Nebius (open source, no audio)
    chat: { provider: nebius, model: Qwen/Qwen2.5-72B-Instruct }
    embedding: { provider: nebius, model: BAAI/bge-en-icl }
    # audio omitted — Nebius has no transcription API
