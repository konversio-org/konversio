# Pilot LLM preset bundles.
#
# Each preset assigns a provider + model to each of the three routing slots
# (chat, embedding, audio). Selecting a preset in Super Admin > LLM Settings
# writes the six PILOT_LLM_<SLOT>_* InstallationConfig rows atomically.
#
# Schema:
#   slug:      Stable identifier (kebab-case, also persisted in PILOT_LLM_PRESET)
#   label:     Human-readable name shown in the UI
#   chat:      { provider: <slug>, model: <model id> }
#   embedding: { provider: <slug>, model: <model id> }
#   audio:     { provider: <slug>, model: <model id> }
#
# Validation runs at boot. Presets referencing an unknown provider or a
# provider that doesn't declare the slot's capability are dropped with a
# logged warning — they never raise.
presets:
  - slug: all-scaleway
    label: All Scaleway (EU equivalent of the OpenAI defaults)
    # Gemma 4 26B-a4b-it: MoE (4B active) direct equivalent of gpt-4.1-mini — fast, cheap,
    # vision-capable, explicit Dutch + English support, 128k context.
    # €0.25 input / €0.50 output per million tokens. Highly reliable tool-calling.
    chat: { provider: scaleway, model: gemma-4-26b-a4b-it }
    # Qwen3-Embedding-8B: native 4096 dims, MRL-aware with proper L2-renorm at
    # truncated sizes. Scaleway honors the `dimensions` parameter even though
    # its UI currently says this model cannot be reduced (verified empirically:
    # first-1536 slice + renormalize). At the installation lock of 1536 dims it
    # shares the same pgvector column as OpenAI text-embedding-3-small.
    embedding: { provider: scaleway, model: qwen3-embedding-8b }
    # Whisper large v3: newer/larger variant of OpenAI's whisper-1.
    # €0.003/audio minute (half OpenAI's price).
    audio: { provider: scaleway, model: whisper-large-v3 }

  - slug: all-nebius
    label: All Nebius (open source, no audio)
    chat: { provider: nebius, model: Qwen/Qwen2.5-72B-Instruct }
    # Same Qwen3 embedding family as the Scaleway preset. Nebius uses the
    # Hugging Face-style model ID and also honors `dimensions: 1536` with
    # prefix truncation + L2 renormalization.
    embedding: { provider: nebius, model: Qwen/Qwen3-Embedding-8B }
    # audio omitted — Nebius has no transcription API

  - slug: all-openai
    label: All OpenAI
    chat: { provider: openai, model: gpt-4.1-mini }
    embedding: { provider: openai, model: text-embedding-3-small }
    audio: { provider: openai, model: whisper-1 }
